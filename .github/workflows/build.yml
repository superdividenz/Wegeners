name: Build and Test

# Trigger the workflow on push to the main branch or pull request to main
on:
  push:
    branches:
      - main  # You can replace "main" with your default branch name
  pull_request:
    branches:
      - main  # Trigger on pull requests targeting the "main" branch

jobs:
  build:
    runs-on: ubuntu-latest  # You can change this to another OS if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'  # Change to your required Node.js version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
